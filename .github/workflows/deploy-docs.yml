name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'Python/structural_lib/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy MkDocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for git-revision-date

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install "mkdocs-material>=9.5,<10" "mkdocstrings[python]>=0.25,<1"
          pip install -e Python/

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --strict
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
