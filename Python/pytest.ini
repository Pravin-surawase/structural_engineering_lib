[pytest]
testpaths = tests
pythonpath = .
addopts = -q -m "not slow"
filterwarnings =
    ignore::DeprecationWarning:ezdxf
    ignore::DeprecationWarning:pyparsing
    ignore::pyparsing.warnings.PyparsingDeprecationWarning
    ignore:Importing from structural_lib\.:DeprecationWarning
markers =
    contract: API contract tests (prevents breaking changes)
    unit: Fast unit tests for core calculation modules
    integration: Multi-module integration tests (API, CLI, exports)
    regression: Golden vector tests and VBA parity verification
    property: Property-based tests checking invariants
    performance: Performance benchmark tests
    slow: Tests taking >1 second to complete
    golden: Golden tests that can never be deleted (SP:16 benchmarks, IS 456 constants)
